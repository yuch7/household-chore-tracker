<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Chore Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .login-card {
            width: 100%;
            max-width: 420px;
            padding: 40px;
            border-radius: 20px;
            background: white;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            text-align: center;
        }
        .home-icon {
            font-size: 50px;
            margin-bottom: 20px;
            display: inline-block;
        }
        .btn-google {
            background-color: white;
            border: 1px solid #dadce0;
            color: #3c4043;
            font-weight: 500;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px 20px;
            transition: background-color 0.2s;
        }
        .btn-google:hover {
            background-color: #f8f9fa;
            border-color: #d2e3fc;
        }
        .btn-google img {
            width: 20px;
            margin-right: 12px;
        }
        .whitelist-note {
            font-size: 0.85rem;
            color: #6c757d;
            margin-top: 25px;
        }
    </style>
</head>
<body>

<div class="login-card">
    <div class="home-icon">🏠</div>
    <h2 class="fw-bold mb-1">Maggie & Yuch Budget</h2>
    <p class="text-muted mb-4">Household Management Portal</p>

    <a href="/login" class="btn btn-google w-100 rounded-pill shadow-sm">
        <img src="https://upload.wikimedia.org/wikipedia/commons/5/53/Google_%22G%22_Logo.svg" alt="Google Logo">
        Sign in with Google
    </a>

    <div class="whitelist-note">
        <hr>
        <p class="mb-0">Only whitelisted family emails can access this local instance.</p>
    </div>
</div>

</body>
</html>
